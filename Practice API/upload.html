<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/upload.css">
</head>

<body>

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header text-center">
                <h2>Upload Image</h2>
            </div>
            <div class="card-body">
                <input type="file" id="image" class="form-control mb-3" accept=".jpg,.jpeg,.png">
                <button class="btn btn-success" id="uploadBtn">Upload Image</button>
                <hr>
                <h5>Uploaded Image</h5>
                <img id="uploadedImage" class="uploaded-image" src="" alt="Uploaded image preview" style="display: none;">
            </div>
            <div class="card-footer">
                <button class="btn btn-secondary" onclick="window.location.href = 'Dashboard.html'">Back</button>
            </div>
        </div>
    </div>

    <script src="./js/upload.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
