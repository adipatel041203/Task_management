<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./css/login.css">

</head>

<body>

    <div class="container-fluid vh-100">

        <div class="row h-100">

            <!-- LEFT -->

            <div class="col-lg-6 left-section">

                <div class="left-content">

                    <img src="./images/logo.png" class="logo">

                    <h1 class="hero-title">

                        Welcome Back.<br>

                        <span>Stay Organized.</span><br>

                        Stay Productive.

                    </h1>

                    <div class="feature-list">

                        <div class="feature">

                            <i class="fa-solid fa-shield-halved"></i>

                            <div>

                                <h6>Secure Login</h6>

                                <small>Your data stays protected</small>

                            </div>

                        </div>

                        <div class="feature">

                            <i class="fa-solid fa-bolt"></i>

                            <div>

                                <h6>Fast Access</h6>

                                <small>Login in seconds</small>

                            </div>

                        </div>

                        <div class="feature">

                            <i class="fa-solid fa-list-check"></i>

                            <div>

                                <h6>Manage Tasks</h6>

                                <small>Track everything easily</small>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="col-lg-6 right-section">

                <div class="login-card">

                    <h2>Welcome Back</h2>

                    <p class="subtitle">

                        Sign in to continue your journey

                    </p>

                    <form id="LoginForm">

                        <div class="input-group-custom">

                            <i class="fa-regular fa-envelope"></i>

                            <input type="email" class="form-control" placeholder="Email Address" id="email" required>

                        </div>

                        <div class="input-group-custom">

                            <i class="fa-solid fa-lock"></i>

                            <input type="password" class="form-control" placeholder="Password" id="pwd" required>

                        </div>

                        <button class="login-btn">

                            LOGIN

                        </button>

                        <p class="signup-link">

                            Don't have an account?

                            <a href="./index.html">Create One</a>

                        </p>

                        <p id="message"></p>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <script src="./js/Login.js"></script>

</body>

</html>
