<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link rel="stylesheet" href="./css/dashboard.css">
    <style>
        .btn-danger {
            float: right;
            /* width: 100%; */
        }
    </style>

</head>

<body>

        <div class="container mt-3">
            <div class="row">
                <div class="col-8">
                    <h1>Welcome to <span>TaskFlow</span></h1>
                </div>
                <div class="col-4">
                    <button class="btn btn-primary" id="profileBtn">Profile</button>
                    <button class="btn btn-success" onclick="window.location.href='upload.html'">
                        Upload Image
                    </button>
                    <button class="btn btn-danger" id="logoutBtn">Logout</button>
                </div>
            </div>
        </div>

        <div class="container mt-5">

            <form action="#" id="taskForm">
                <input type="text" class="form-control mb-4" placeholder="Enter task title" id="title">
                <textarea id="description" placeholder="Enter description" class="class-form mb-4"></textarea>
                <select name="priority" id="priority" class="form-control mb-4">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
                <button type="submit" class="btn btn-primary mb-2">Create task</button>
                <p id="message"></p>
            </form>



            <div class="container">
                <div class="row">
                    <div class="mb-3 mt-3">
                        <label for="priorityFilter" class="form-label">Filter Tasks</label>
                        <select id="priorityFilter" class="form-select">
                            <option value="">All Tasks</option>
                            <option value="high">High Priority</option>
                            <option value="medium">Medium Priority</option>
                            <option value="low">Low Priority</option>
                        </select>
                    </div>
                    <div id="taskList"></div>
                </div>
            </div>

        </div>

        <footer>© 2026 TaskFlow | Developed by Aditya Patel</footer>

    <script src="./js/Dashboard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
