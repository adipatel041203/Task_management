<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/index.css">
</head>

<body>

    <div class="container-fluid vh-100">
        <div class="row h-100">

            <!-- Left Side -->
            <div class="col-lg-6 left-section">

                <div class="left-content">

                        <img src="../Practice API/images/Logo.png" class="logo" alt="TaskFlow Logo">

                    <h1 class="hero-title">
                        Organize your work.<br>
                        <span>Track every task.</span><br>
                        Stay productive.
                    </h1>

                    <div class="feature-grid">

                        <div class="feature-item">
                            <div class="icon-circle">
                                <i class="bi bi-check2-square"></i>
                            </div>
                            <div>
                                <h6>Create & Manage</h6>
                                <small>Organize tasks easily</small>
                            </div>
                        </div>

                        <div class="feature-item">
                            <div class="icon-circle">
                                <i class="bi bi-graph-up-arrow"></i>
                            </div>
                            <div>
                                <h6>Track Progress</h6>
                                <small>Monitor every project</small>
                            </div>
                        </div>

                        <div class="feature-item">
                            <div class="icon-circle">
                                <i class="bi bi-flag"></i>
                            </div>
                            <div>
                                <h6>Priority Tasks</h6>
                                <small>Focus on important work</small>
                            </div>
                        </div>

                        <div class="feature-item">
                            <div class="icon-circle">
                                <i class="bi bi-shield-lock"></i>
                            </div>
                            <div>
                                <h6>Secure Dashboard</h6>
                                <small>Your data stays protected</small>
                            </div>
                        </div>

                    </div>

                </div>

            </div>

            <!-- Right Side -->

            <div class="col-lg-6 right-section">

                <form id="signupForm" class="signup-card">

                    <h2>Create Account</h2>

                    <p class="login-link">
                        Already a member?
                        <a href="./Login.html">Sign In</a>
                    </p>

                    <div class="input-group-custom">
                        <i class="bi bi-person"></i>
                        <input type="text" id="fullName" class="form-control" placeholder="Full Name" required>
                    </div>

                    <div class="input-group-custom">
                        <i class="bi bi-envelope"></i>
                        <input type="email" id="email" class="form-control" placeholder="Email Address" required>
                    </div>

                    <div class="input-group-custom">
                        <i class="bi bi-lock"></i>
                        <input type="password" id="pwd" class="form-control" placeholder="Password" required>
                    </div>

                    <label class="gender-title">Gender</label>

                    <div class="gender-box">

                        <label class="gender-option">
                            <input type="radio" name="gender" value="male">
                            Male
                        </label>

                        <label class="gender-option">
                            <input type="radio" name="gender" value="female">
                            Female
                        </label>

                    </div>

                    <button class="signup-btn">
                        CREATE ACCOUNT
                    </button>

                    <p id="message"></p>

                </form>

            </div>

        </div>
    </div>

    <script src="./js/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

</body>

</html>
