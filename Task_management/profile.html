<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link rel="stylesheet" href="./css/profile.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-header text-center">
                <h2>User Profile</h2>
            </div>

            <div class="card-body">

                <div class="text-center mb-4">
                    <img id="profilePreview"
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSaFeioPLnEOiRJqeXk9mWZsfINuCow3ipsvFW3GBggpA&s=10"
                        class="rounded-circle" width="150" height="150">
                </div>

                <input type="text" id="fullName" class="form-control mb-3" placeholder="Full Name">

                <input type="text" id="gender" class="form-control mb-3" placeholder="Gender">

                <input type="text" id="address" class="form-control mb-3" placeholder="Address">

                <input type="text" id="universityName" class="form-control mb-3" placeholder="University Name">

                <input type="text" id="city" class="form-control mb-3" placeholder="City">

                <input type="text" id="guardianName" class="form-control mb-3" placeholder="Guardian Name">

                <input type="text" id="guardianPhoneNumber" class="form-control mb-3"
                    placeholder="Guardian Phone Number">

                <input type="text" id="personalMobileNumber" class="form-control mb-3"
                    placeholder="Personal Mobile Number">

                <input type="file" id="profileImage" class="form-control mb-3" accept=".jpg,.jpeg,.png">
            </div>

            <div class="card-footer">

                <button class="btn btn-success" id="updateProfileBtn">
                    Update Profile
                </button>

                <button class="btn btn-secondary" onclick="window.location.href='dashboard.html'">
                    Back to Dashboard
                </button>

            </div>

        </div>

    </div>


    <script src="./js/profile.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
